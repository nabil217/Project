<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Registration – CSC 4182</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #dde0e5;
      padding: 2rem 2.25rem;
      width: 100%;
      max-width: 460px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .card-header p {
      font-size: 14px;
      color: #6b7280;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    label .optional {
      font-weight: 400;
      color: #9ca3af;
      font-size: 12px;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
      background: #fafafa;
    }

    input:focus {
      border-color: #534AB7;
      background: #fff;
    }

    .error-msg {
      display: none;
      font-size: 12px;
      color: #E24B4A;
      margin-top: 5px;
    }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: #3C3489; }

    .success-box {
      display: none;
      text-align: center;
      padding: 1.5rem 1rem;
    }

    .success-box .checkmark {
      width: 56px;
      height: 56px;
      background: #EAF3DE;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 26px;
    }

    .success-box h2 {
      font-size: 18px;
      color: #27500A;
      margin-bottom: 6px;
    }

    .success-box p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 1.25rem;
    }

    .btn-reset {
      padding: 9px 24px;
      background: transparent;
      border: 1.5px solid #534AB7;
      color: #534AB7;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset:hover { background: #EEEDFE; }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.25rem 0;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <h1>Create Account</h1>
    <p>Fill in the details below to register</p>
  </div>

  <div id="success-msg" class="success-box">
    <div class="checkmark">&#10003;</div>
    <h2>Registration Successful!</h2>
    <p>Your account has been created. All fields passed validation.</p>
    <button class="btn-reset" onclick="resetForm()">Register Another</button>
  </div>

  <div id="form-fields">
    <form onsubmit="return validateForm();" novalidate>

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="e.g. Rahim Uddin" />
        <span class="error-msg" id="fullname-error"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="e.g. rahim@example.com" />
        <span class="error-msg" id="email-error"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimum 4 characters" />
        <span class="error-msg" id="password-error"></span>
        <p class="hint">Must be at least 4 characters long</p>
      </div>

      <hr class="divider" />

      <div class="form-group">
        <label for="phone">Phone Number <span class="optional">(optional)</span></label>
        <input type="tel" id="phone" placeholder="e.g. 0171234567" />
        <span class="error-msg" id="phone-error"></span>
        <p class="hint">If provided, must be exactly 10 digits</p>
      </div>

      <button type="submit" class="btn-submit">Register</button>

    </form>
  </div>

</div>

<script src="validate.js"></script>
</body>
</html>
